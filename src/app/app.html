@if (isLoggedIn()) {
  <mat-sidenav-container class="app-container">
    <mat-sidenav mode="side" opened class="app-sidenav">
      <div class="sidenav-header">
        <mat-icon class="logo-icon">speed</mat-icon>
        <span class="logo-text">MomentumPM</span>
      </div>
      <mat-nav-list>
        <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
          <mat-icon matListItemIcon>dashboard</mat-icon>
          <span matListItemTitle>Dashboard</span>
        </a>
        <a mat-list-item routerLink="/projects" routerLinkActive="active-link">
          <mat-icon matListItemIcon>folder</mat-icon>
          <span matListItemTitle>Projects</span>
        </a>
      </mat-nav-list>
      <div class="sidenav-footer">
        <div class="user-info">
          <mat-icon>account_circle</mat-icon>
          <span>{{ user()?.username }}</span>
        </div>
        <button mat-icon-button (click)="auth.logout()" matTooltip="Logout">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </mat-sidenav>
    <mat-sidenav-content>
      <router-outlet />
    </mat-sidenav-content>
  </mat-sidenav-container>
} @else {
  <router-outlet />
}
